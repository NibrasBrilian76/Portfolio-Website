<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shonou.io • Portfolio</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
</head>
<body>
    <div id="particles-js"></div>
    <div style="position:fixed;top:70px;left:20px;z-index:100">
    <button onclick="history.back()" 
        style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;padding:10px 18px;border-radius:12px;cursor:pointer;backdrop-filter:blur(10px);font-size:14px;width:auto;margin-top:0">
        ← Kembali
    </button>
</div>

<div id="loader">
  <h1>Loading Portfolio... 🔥</h1>
</div>

<div class="background"></div>

<div class="container">
  <div class="card">

    <img id="portfolioImage" src="https://via.placeholder.com/120" class="profile">

    <h1 id="portfolioUsername"></h1>

    <p id="portfolioBio"></p>

    <div class="stats">
      <div class="statBox">
        <h2 id="skillCount">0</h2>
        <p>Skills</p>
      </div>
      <div class="statBox">
        <h2 id="projectCount">0</h2>
        <p>Projects</p>
      </div>
      <div class="statBox">
        <h2 id="socialCount">0</h2>
        <p>Socials</p>
      </div>
    </div>

    <div id="portfolioSkills"></div>

    <div id="portfolioProjects"></div>

    <div id="portfolioSocials"></div>

    <button onclick="copyLink()">Copy Portfolio Link 🔗</button>

  </div>
</div>

<script>
// Ambil username dari URL: /publik.html?user=nibras
const params = new URLSearchParams(window.location.search);
const username = params.get("user");

if(!username){
    document.body.innerHTML = "<h1 style='color:white;text-align:center;margin-top:100px'>User tidak ditemukan</h1>";
}

async function loadPortfolio(){

    // Tampilkan skeleton dulu
    document.getElementById("portfolioUsername").innerHTML = `<div class="skeleton skeletonText" style="width:150px;margin:0 auto"></div>`;
    document.getElementById("portfolioBio").innerHTML = `<div class="skeleton skeletonText" style="width:250px"></div>`;
    document.getElementById("portfolioSkills").innerHTML = `
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
            <div class="skeleton" style="width:80px;height:35px"></div>
            <div class="skeleton" style="width:100px;height:35px"></div>
            <div class="skeleton" style="width:70px;height:35px"></div>
        </div>
    `;
    document.getElementById("portfolioProjects").innerHTML = `
        <div class="skeleton skeletonCard"></div>
        <div class="skeleton skeletonCard"></div>
    `;
    const res = await fetch(`/user/${username}`);
    const data = await res.json();

    if(!data.username){
        document.body.innerHTML = "<h1 style='color:white;text-align:center;margin-top:100px'>User tidak ditemukan</h1>";
        return;
    }

    // Theme
    if(data.portfolio.theme_color){
        document.documentElement.style.setProperty("--mainGradient", data.portfolio.theme_color);
    }

    // Typing username
    let i = 0;
    function typing(){
        if(i < data.username.length){
            document.getElementById("portfolioUsername").innerHTML += data.username.charAt(i);
            i++;
            setTimeout(typing, 100);
        }
    }
    typing();

    // Bio
    if(data.portfolio.bio){
        document.getElementById("portfolioBio").innerText = data.portfolio.bio;
    }

    // Foto profil
if(data.portfolio.profile_image){
    document.getElementById("portfolioImage").src = data.portfolio.profile_image;
}

    // Stats
    function animasiCounter(id, target){
    let count = 0;
    const duration = 1000;
    const interval = duration / target || duration;
    const timer = setInterval(() => {
        count++;
        document.getElementById(id).innerText = count;
        if(count >= target) clearInterval(timer);
    }, interval);
}

animasiCounter("skillCount", data.skills.length);
animasiCounter("projectCount", data.projects.length);
animasiCounter("socialCount", data.socials.length);

    // Skills
    const skillContainer = document.getElementById("portfolioSkills");
    data.skills.forEach(skill => {
        const div = document.createElement("div");
        div.classList.add("skill");
        div.innerText = skill.skill_name;
        skillContainer.appendChild(div);
    });

    // Projects
    const projectContainer = document.getElementById("portfolioProjects");
    data.projects.forEach(project => {
        const div = document.createElement("div");
        div.classList.add("projectCard");
        div.innerHTML = `
            ${project.project_image ? `<img src="${project.project_image}" class="projectImage">` : ""}
            <h3>${project.project_name}</h3>
            <p>${project.project_desc}</p>
        `;
        projectContainer.appendChild(div);
    });

    // Socials
    const socialContainer = document.getElementById("portfolioSocials");
    data.socials.forEach(social => {
        const div = document.createElement("div");
        div.classList.add("socialCard");
        div.innerHTML = `<a href="${social.social_link}" target="_blank">${social.social_name}</a>`;
        socialContainer.appendChild(div);
    });

    // Sembunyikan loader
    setTimeout(() => {
        document.getElementById("loader").style.display = "none";
    }, 1000);
}

function copyLink(){
    navigator.clipboard.writeText(window.location.href);
    showToast("Link tersalin! 🔥");
}

loadPortfolio();
</script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/ScrollTrigger.min.js"></script>
<script src="gsap-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script src="particles-config.js"></script>
<script src="transition.js"></script>
<script src="toast.js"></script>

</body>
</html>
