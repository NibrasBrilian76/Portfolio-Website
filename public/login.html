<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shonou.io • Login</title>

  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
</head>
<body>
  <div id="particles-js"></div>

<div class="background"></div>

<div class="container">

  <form id="loginForm" class="card">

    <h1>Welcome Back</h1>

    <p class="subtitle">
      Login to continue 🔥
    </p>

    <input type="text" id="username" placeholder="Username" required>

    <div class="passwordWrapper">
    <input type="password" id="password" placeholder="Password" required>
    <button type="button" class="eyeBtn" onclick="togglePassword('password', this)">👁️</button>
</div>

    <button type="submit">
      Login
    </button>

    <p id="message"></p>

  </form>

</div>

<script>

const form = document.getElementById("loginForm");

form.addEventListener("submit", async function(e){
    e.preventDefault();

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    if(!validasiInput(username, "Username", { min: 1 })) return;
    if(!validasiInput(password, "Password", { min: 1 })) return;

    const btn = document.querySelector("button[type='submit']");
    btn.innerText = "Loading...";
    btn.classList.add("btn-loading");

    const response = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    });

    const data = await response.text();
    btn.innerText = "Login";
    btn.classList.remove("btn-loading");

    showToast(data.includes("berhasil") ? data : data, data.includes("berhasil") ? "success" : "error");

    if(data.includes("berhasil")){
        setTimeout(() => {
            window.location.href = "/dashboard.html";
        }, 1000);
    }
});

</script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/ScrollTrigger.min.js"></script>
<script src="gsap-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script src="particles-config.js"></script>

<script>
function togglePassword(id, btn){
    const input = document.getElementById(id);
    if(input.type === "password"){
        input.type = "text";
        btn.innerText = "🙈";
    } else {
        input.type = "password";
        btn.innerText = "👁️";
    }
}
</script>
<script src="transition.js"></script>
<script src="toast.js"></script>
<script src="helpers.js"></script>

</body>
</html>
