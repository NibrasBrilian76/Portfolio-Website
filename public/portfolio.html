<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shonou.io • Portfolio</title>
  <link rel="stylesheet" href="style.css">
  <script src="sidebar.js"></script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
</head>
<body>

<!-- Modal Konfirmasi -->
<div id="modalKonfirmasi" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:9998;justify-content:center;align-items:center">
    <div style="background:#1e293b;border-radius:20px;padding:25px;max-width:350px;width:90%;border:1px solid rgba(255,255,255,0.1);text-align:center">
        <h3 style="color:white;margin-bottom:10px">Hapus Project? 🗑️</h3>
        <p style="color:#94a3b8;margin-bottom:20px;font-size:14px">Project yang dihapus tidak bisa dikembalikan.</p>
        <div style="display:flex;gap:10px">
            <button id="btnBatalHapus" style="flex:1;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1)">Batal</button>
            <button id="btnKonfirmasiHapus" style="flex:1;background:linear-gradient(45deg,#ef4444,#dc2626)">Hapus</button>
        </div>
    </div>
</div>

    <div id="particles-js"></div>

<div id="loader">
  <h1>Loading Portfolio... 🔥</h1>
</div>

<div class="background"></div>

<div class="container">
  <div class="card">

    <img id="portfolioImage" src="https://via.placeholder.com/120" class="profile">

    <h1 id="portfolioUsername"></h1>

    <p id="portfolioBio"></p>

    <div class="stats">
      <div class="statBox">
        <h2 id="skillCount">0</h2>
        <p>Skills</p>
      </div>
      <div class="statBox">
        <h2 id="projectCount">0</h2>
        <p>Projects</p>
      </div>
      <div class="statBox">
        <h2 id="socialCount">0</h2>
        <p>Socials</p>
      </div>
    </div>

    <div id="portfolioSkills"></div>

    <div id="portfolioProjects"></div>

    <div id="portfolioSocials"></div>

    <button onclick="window.location.href='/dashboard.html'">
      Edit Portfolio ✏️
    </button>

  </div>
</div>

<script>
async function loadPortfolio(){

    // Tampilkan skeleton dulu
    document.getElementById("portfolioUsername").innerHTML = `<div class="skeleton skeletonText" style="width:150px;margin:0 auto"></div>`;
    document.getElementById("portfolioBio").innerHTML = `<div class="skeleton skeletonText" style="width:250px"></div>`;
    document.getElementById("portfolioSkills").innerHTML = `
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
            <div class="skeleton" style="width:80px;height:35px"></div>
            <div class="skeleton" style="width:100px;height:35px"></div>
            <div class="skeleton" style="width:70px;height:35px"></div>
        </div>
    `;
    document.getElementById("portfolioProjects").innerHTML = `
        <div class="skeleton skeletonCard"></div>
        <div class="skeleton skeletonCard"></div>
    `;

    const res = await fetch("/ambil-portfolio");
    const data = await res.json();

    // Username dari cek-login
    const loginRes = await fetch("/cek-login");
    const loginData = await loginRes.json();

    if(!loginData.loggedIn){
        window.location.href = "/login.html";
        return;
    }

    const username = loginData.user.username;
    buatSidebar(loginData.user.username);

    // Typing effect untuk username
    let i = 0;
    function typing(){
        if(i < username.length){
            document.getElementById("portfolioUsername").innerHTML += username.charAt(i);
            i++;
            setTimeout(typing, 100);
        }
    }
    typing();

    // Bio
    if(data.portfolio.bio){
        document.getElementById("portfolioBio").innerText = data.portfolio.bio;
    }

    // Theme
    if(data.portfolio.theme_color){
    document.documentElement.style.setProperty("--mainColor", data.portfolio.theme_color);
}
if(data.portfolio.theme_gradient){
    document.documentElement.style.setProperty("--mainGradient", data.portfolio.theme_gradient);
}

console.log("theme_gradient:", data.portfolio.theme_gradient);
console.log("theme_color:", data.portfolio.theme_color);

    if(data.portfolio.profile_image){
    document.getElementById("portfolioImage").src = data.portfolio.profile_image;
}

    // Stats
    function animasiCounter(id, target){
    let count = 0;
    const duration = 1000;
    const interval = duration / target || duration;
    const timer = setInterval(() => {
        count++;
        document.getElementById(id).innerText = count;
        if(count >= target) clearInterval(timer);
    }, interval);
}

animasiCounter("skillCount", data.skills.length);
animasiCounter("projectCount", data.projects.length);
animasiCounter("socialCount", data.socials.length);

    // Skills
    const skillContainer = document.getElementById("portfolioSkills");
    data.skills.forEach(skill => {
        const div = document.createElement("div");
        div.classList.add("skill");
        div.innerText = skill.skill_name;
        skillContainer.appendChild(div);
    });

    // Projects
    const projectContainer = document.getElementById("portfolioProjects");
    data.projects.forEach(project => {
    const div = document.createElement("div");
    div.classList.add("projectCard");
    div.innerHTML = `
        ${project.project_image ? `<img src="${project.project_image}" class="projectImage">` : ""}
        <h3 id="nama-${project.id}">${project.project_name}</h3>
        <p id="desc-${project.id}">${project.project_desc}</p>
        <div style="display:flex;gap:10px;margin-top:10px">
            <button onclick="editProject(${project.id})"
                style="width:auto;padding:8px 15px">
                Edit ✏️
            </button>
            <button onclick="hapusProject(${project.id})"
                style="width:auto;padding:8px 15px;background:linear-gradient(45deg,#ef4444,#dc2626)">
                Hapus 🗑️
            </button>
        </div>
    `;
    projectContainer.appendChild(div);
});

    // Socials
    const socialContainer = document.getElementById("portfolioSocials");
    data.socials.forEach(social => {
        const div = document.createElement("div");
        div.classList.add("socialCard");
        div.innerHTML = `<a href="${social.social_link}" target="_blank">${social.social_name}</a>`;
        socialContainer.appendChild(div);
    });

    // Sembunyikan loader
    setTimeout(() => {
        document.getElementById("loader").style.display = "none";
    }, 1000);
}

async function editProject(id){
    const namaBaru = prompt("Nama project baru:", document.getElementById(`nama-${id}`).innerText);
    if(namaBaru === null) return;

    const descBaru = prompt("Deskripsi baru:", document.getElementById(`desc-${id}`).innerText);
    if(descBaru === null) return;

    const res = await fetch(`/edit-project/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ project_name: namaBaru, project_desc: descBaru })
    });

    const data = await res.text();
    showToast(data);
    location.reload();
}

async function hapusProject(id){
    const modal = document.getElementById("modalKonfirmasi");
    modal.style.display = "flex";

    document.getElementById("btnBatalHapus").onclick = () => {
        modal.style.display = "none";
    };

    document.getElementById("btnKonfirmasiHapus").onclick = async () => {
        modal.style.display = "none";
        await fetch(`/hapus-project/${id}`, { method: "DELETE" });
        showToast("Project dihapus! 🗑️");
        setTimeout(() => location.reload(), 1500);
    };
}

loadPortfolio();
</script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/ScrollTrigger.min.js"></script>
<script src="gsap-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script src="particles-config.js"></script>
<script src="transition.js"></script>
<script src="toast.js"></script>

</body>
</html>
